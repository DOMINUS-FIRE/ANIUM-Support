services:
  - type: web
    name: anium-service-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPPORT_CHAT_ID
        sync: false
      - key: SUPPORT_THREAD_ID
        sync: false
      - key: WEBSITE_URL
        sync: false
      - key: WEBSITE_ORIGINS
        sync: false
      - key: DB_PATH
        value: support.db
