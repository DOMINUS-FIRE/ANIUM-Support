services:
  - type: web
    name: anium-support-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPPORT_CHAT_ID
        value: "@thfjffhf"
      - key: SUPPORT_THREAD_ID
        value: ""
